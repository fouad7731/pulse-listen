name: Collecte & export (gratuit)

# Rafraichit les donnees toutes les 6h (cron GitHub gratuit) + bouton manuel.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

# Autorise le job a committer les donnees regenerees
permissions:
  contents: write

# Evite deux runs simultanes qui se marcheraient dessus
concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_JrdyqS4k4sYn0X0Isl9lt7Z9
      VERCEL_PROJECT_ID: prj_oFTUygWDWO3vIFvnRz97Wzuj1Wyi
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installer les dependances
        run: pip install -r backend/requirements.txt

      - name: Collecte + export statique
        working-directory: backend
        run: python -m app.collect_once

      - name: Commit des donnees mises a jour
        run: |
          git config user.name "pulse-bot"
          git config user.email "actions@github.com"
          git add backend/data_storage/posts.db frontend/public/data frontend/public/reports
          if git diff --cached --quiet; then
            echo "Aucun changement de donnees."
          else
            git commit -m "data: rafraichissement auto $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Deploiement Vercel (rebuild avec les nouvelles donnees)
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: npx vercel@latest deploy --prod --yes --cwd frontend --token "$VERCEL_TOKEN"
